<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

<style>*{
    background-color: rgb(31, 226, 155);
}
h1{
    text-align: center;
}
main{
    border: 2px solid darkgray;
    background-color: azure;
    border-radius: 8px;
    padding: 100px;
    margin: 100px;
    display: flex;
    flex-wrap: wrap;

}

.boxes{
    height: 100px;
    width: 100px;
    border: 10px solid rgb(161, 54, 11);
    display: inline-block;
    margin: 25px;
    display: flex;
    justify-content: center;
    align-items: center;
}</style></head>
<body>
    <h1>flex example</h1>
    <main>
        <div class="boxes">box1</div>
        <div class="boxes">box2</div>
        <div class="boxes">box3</div>
        <div class="boxes">box4</div>
        <div class="boxes">box5</div>
        <div class="boxes">box6</div>
        </main>
    </div>
</body>
</html>
