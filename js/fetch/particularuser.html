    <div id="main">
        <form id="maincontainer">
            <input type="number" id="userinput" value="1" min="1" max="10" />
            <button onclick="handleclick(event)">search</button>
        </form>
    </div>
    <div id="output"></div>

    <script>
        const fetchData = async (useridinput) => {
            const output = document.getElementById("output")
            const data = await fetch(`https://jsonplaceholder.typicode.com/users/${useridinput}`);
            const response = await data.json();
            console.log(response)
            output.innerHTML = `
            ${response.name}
            `
        }
        const handleclick=(e)=>{
            e.preventDefault()
            const useridinput=document.getElementById("userinput").value;
            fetchData(useridinput)
        }

    </script>
